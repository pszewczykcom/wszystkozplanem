name: Deployment Status

on:
  push:
    branches: ["master"]

jobs:
  track-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Set status to pending
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"pending","description":"Coolify deployment in progress...","context":"Coolify Deploy"}'

      - name: Wait for deployment to finish
        id: check
        run: |
          echo "Waiting 30s for Coolify to start building..."
          sleep 30

          for i in $(seq 1 40); do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              "${{ secrets.COOLIFY_BASE_URL }}/api/v1/applications/${{ secrets.COOLIFY_APP_ID }}")

            STATUS=$(echo "$RESPONSE" | jq -r '.status // empty')
            echo "Attempt $i/40: status = $STATUS"

            if echo "$STATUS" | grep -q "^running"; then
              echo "result=success" >> $GITHUB_OUTPUT
              echo "desc=Deployed successfully" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$STATUS" = "exited" ] || [ "$STATUS" = "error" ] || [ "$STATUS" = "restarting" ]; then
              echo "result=failure" >> $GITHUB_OUTPUT
              echo "desc=Deployment failed" >> $GITHUB_OUTPUT
              exit 0
            fi

            sleep 15
          done

          echo "result=failure" >> $GITHUB_OUTPUT
          echo "desc=Deployment timed out" >> $GITHUB_OUTPUT

      - name: Update commit status
        if: always()
        run: |
          STATE="${{ steps.check.outputs.result || 'failure' }}"
          DESC="${{ steps.check.outputs.desc || 'Could not determine deployment status' }}"

          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d "{\"state\":\"$STATE\",\"description\":\"$DESC\",\"context\":\"Coolify Deploy\",\"target_url\":\"${{ secrets.COOLIFY_BASE_URL }}\"}"
